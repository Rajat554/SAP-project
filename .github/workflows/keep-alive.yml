name: Keep BTP App Alive

# The "cron" schedule tells GitHub when to run this.
on:
  schedule:
    # "*/15 * * * *" means run every 15 minutes.
    - cron: "*/30 * * * *"
  # This allows you to trigger the action manually from the GitHub Actions tab.
  workflow_dispatch:

jobs:
  ping-app:
    runs-on: ubuntu-latest
    steps:
      - name: Ping SAP BTP Application
        # The curl command makes a web request to your app, making SAP BTP think a user is visiting.
        # IMPORTANT: Replace the URL below with the actual live URL of your deployed BTP application.
        run: curl -sSf https://d4850873trial.launchpad.cfapps.ap21.hana.ondemand.com > /dev/null
