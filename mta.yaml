_schema-version: "3.2"
ID: sap-project
version: 1.0.0
description: A Fiori application for WashWizard.

parameters:
  enable-parallel-executions: true

modules:
  # 1. The UI Module
  - name: sap-project-ui
    type: javascript.nodejs
    path: .
    build-parameters:
      build-result: dist
      builder: custom
      commands:
        - npm install
        - npm run build
    parameters:
      buildpack: https://github.com/cloudfoundry/staticfile-buildpack.git
      memory: 128M
      disk-quota: 256M
    requires:
      - name: sap-project-repo-host
    provides:
      - name: ui_api
        properties:
          url: ${default-url}

  # 2. The Standalone Router (For Public Link)
  - name: sap-project-router
    type: approuter.nodejs
    path: router 
    parameters:
      disk-quota: 256M
      memory: 256M
    requires:
      - name: ui_api
        group: destinations
        properties:
          forwardAuthToken: false
          name: ui_target
          url: ~{url}
      - name: sap-project-dest-service # Required for Launchpad visibility

resources:
  - name: sap-project-repo-host
    type: org.cloudfoundry.managed-service
    parameters:
      service: html5-apps-repo
      service-plan: app-host

  - name: sap-project-xsuaa
    type: org.cloudfoundry.managed-service
    parameters:
      service: xsuaa
      service-plan: application
      config:
        xsappname: sap-project
        tenant-mode: dedicated

  # ADDED: Destination service so the Launchpad can find the app
  - name: sap-project-dest-service
    type: org.cloudfoundry.managed-service
    parameters:
      service: destination
      service-plan: lite