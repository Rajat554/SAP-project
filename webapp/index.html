<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>WashWizard Manager</title>
    <!--
      Startup order (with async=true):
      1. UI5 core loads asynchronously from CDN
      2. data-sap-ui-oninit fires our "initApp" module
      3. initApp starts MockServer first, then defers to ComponentSupport
      4. ComponentSupport creates the UIComponent which creates the ODataModel
      5. ODataModel fires $metadata → intercepted by MockServer ✅
    -->
    <script
      id="sap-ui-bootstrap"
      src="https://ui5.sap.com/resources/sap-ui-core.js"
      data-sap-ui-theme="sap_horizon"
      data-sap-ui-libs="sap.m,sap.f,sap.ui.layout,sap.ui.core"
      data-sap-ui-compatVersion="edge"
      data-sap-ui-async="true"
      data-sap-ui-oninit="module:sap/ui/core/ComponentSupport"
      data-sap-ui-resourceroots='{
        "sap.ui.demo.walkthrough": "./"
      }'
    ></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  </head>
  <body class="sapUiBody" id="content">
    <div
      id="container"
      data-sap-ui-component
      data-name="sap.ui.demo.walkthrough"
      data-id="walkthrough"
      data-settings='{"id":"walkthrough"}'
      data-handle-validation="true"
    ></div>
  </body>
</html>
